version: '3.8'

services:
  # Go backend: scraper + API server
  lemmy-scraper:
    # Pull from GitHub Container Registry
    image: ghcr.io/st2projects/lemmy-media-scraper:latest

    # For local development, use build instead:
    # build:
    #   context: .
    #   dockerfile: Dockerfile

    container_name: lemmy-scraper
    restart: unless-stopped

    # Mount volumes for config, downloads, and thumbnails
    volumes:
      # Config directory - place your config.yaml here
      - ./config:/config:ro
      # Downloads directory - media will be saved here
      - ./downloads:/downloads:rw
      # Thumbnails directory
      - ./thumbnails:/thumbnails:rw

    # Go API is only accessible via the internal Docker network (scraper-network).
    # No host port mapping — all external access goes through the lemmy-web frontend.

    # Environment variables
    environment:
      - TZ=UTC
      - CONFIG_PATH=/config/config.yaml

    # Use custom network
    networks:
      - scraper-network

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Health check
    healthcheck:
      test: ["CMD", "pgrep", "-x", "lemmy-scraper"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # SvelteKit web UI frontend
  lemmy-web:
    # Pull from GitHub Container Registry
    image: ghcr.io/st2projects/lemmy-media-scraper-web:latest

    # For local development, use build instead:
    # build:
    #   context: .
    #   dockerfile: Dockerfile.web

    container_name: lemmy-web
    restart: unless-stopped
    depends_on:
      lemmy-scraper:
        condition: service_healthy

    # Expose the web UI port
    ports:
      - "8080:8080"

    # Environment variables
    environment:
      - TZ=UTC
      - PORT=8080
      # The SvelteKit server-side routes proxy API calls to the Go backend
      - GO_BACKEND_URL=http://lemmy-scraper:8081
      # SvelteKit ORIGIN setting for CSRF protection
      - ORIGIN=http://localhost:8080
      # WebSocket URL for real-time progress updates (browser connects directly to Go backend)
      - PUBLIC_WS_URL=ws://localhost:8081

    # Use custom network (same as backend for inter-service communication)
    networks:
      - scraper-network

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Health check
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# Networks
networks:
  scraper-network:
    driver: bridge
